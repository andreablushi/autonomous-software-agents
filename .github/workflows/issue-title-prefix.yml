# Automatically prefix issue titles based on "Area" and "Priority" fields in the issue body, and sync corresponding labels.
name: Prefix issue titles from form fields
# Triggers whenever an issue is opened or edited
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  prefix-and-label:
    runs-on: ubuntu-latest
    steps:
      - name: Prefix title and sync labels from Area/Priority
        uses: actions/github-script@v7
        with:
          script: |
            // Extract the issue from the event payload
            const issue = context.payload.issue;
            if (!issue || !issue.body) {
              return;
            }

            const extractFieldValue = (label) => {
              const regex = new RegExp(`###\\s*${label}\\s*\\r?\\n+([^\\r\\n]+)`, 'i');
              const match = issue.body.match(regex);
              if (!match) {
                return null;
              }

              const value = match[1].trim().toLowerCase();
              if (!value) {
                return null;
              }

              return value.replace(/[^a-z0-9_-]+/g, '-');
            };

            // Extract Area and Priority values from the issue body
            const area = extractFieldValue('Area');
            const priority = extractFieldValue('Priority');

            if (!area && !priority) {
              return;
            }

            const currentTitle = issue.title || '';
            // Remove existing [area:...] and [priority:...] prefixes from the title
            const titleWithoutPrefix = currentTitle
              .replace(/^\s*(?:\[(?:area|priority):[^\]]+\])+\s*/i, '')
              .trim();

            // Build the new title prefix based on the extracted Area and Priority values
            const prefixParts = [];
            if (area) {
              prefixParts.push(`[area:${area}]`);
            }
            if (priority) {
              prefixParts.push(`[priority:${priority}]`);
            }

            const newTitle = `${prefixParts.join('')}${titleWithoutPrefix ? ` ${titleWithoutPrefix}` : ''}`;
            if (newTitle !== currentTitle) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: newTitle,
              });
            }

            const existingLabels = (issue.labels || []).map((label) =>
              typeof label === 'string' ? label : label.name
            );

            const labelsWithoutAreaPriority = existingLabels.filter(
              (labelName) =>
                !labelName.startsWith('area:') && !labelName.startsWith('priority:')
            );

            const newLabels = [...labelsWithoutAreaPriority];
            if (area) {
              newLabels.push(`area:${area}`);
            }
            if (priority) {
              newLabels.push(`priority:${priority}`);
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...new Set(newLabels)],
            });
