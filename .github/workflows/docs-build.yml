name: Docs Build
# This workflow compiles the LaTeX documents in the docs directory whenever changes 
#are pushed to the main branch or when a pull request is opened targeting the main branch
#but only if the changes affect files in the docs directory or this workflow file itself.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yml"
permissions:
  contents: write
  
jobs:
  build-docs:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Compile report LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report.tex
          working_directory: docs/report/LaTeX

      - name: Compile presentation LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: presentation.tex
          working_directory: docs/presentation/LaTeX

      - name: Install preview generation dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Update PDFs and previews
        run: |
          mkdir -p docs/media
          cp docs/report/LaTeX/report.pdf docs/report/report.pdf
          cp docs/presentation/LaTeX/presentation.pdf docs/presentation/presentation.pdf
          pdftoppm -png -singlefile -f 1 docs/report/report.pdf docs/media/report-preview
          pdftoppm -png -singlefile -f 1 docs/presentation/presentation.pdf docs/media/presentation-preview
      
      - name: Commit and push generated docs
        run: |
          git config user.name "[GitHub Actions]LaTeX Builder Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report/report.pdf docs/presentation/presentation.pdf docs/media/report-preview.png docs/media/presentation-preview.png
          if git diff --cached --quiet; then
            echo "No generated file changes to commit"
            exit 0
          fi
          git commit -m "docs: update generated PDFs and previews [skip ci]"

          TARGET_BRANCH="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.event.pull_request.head.ref }}"
          fi

          git push origin "HEAD:${TARGET_BRANCH}" || echo "Push failed (likely fork PR permissions or branch protections)."